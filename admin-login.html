<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود ادمین | قصر طلا</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
<div class="login-shell">
  <div class="login-card">
    <div class="hallmark seal" style="width:52px;height:52px;font-size:22px">ق</div>
    <h1>ورود به پنل مدیریت</h1>
    <form id="login-form">
      <div class="field"><label>نام کاربری</label><input name="username" required autofocus></div>
      <div class="field"><label>رمز عبور</label><input name="password" type="password" required></div>
      <button class="btn btn-gold btn-block" type="submit">ورود</button>
    </form>
    <p class="hint" id="err" style="color:#e79999;margin-top:12px;display:none">نام کاربری یا رمز عبور اشتباه است.</p>
    <p class="hint" style="margin-top:18px">نام کاربری و رمز پیش‌فرض: <b>admin</b> / <b>admin123</b> — حتماً بعد از ورود اول، از بخش تنظیمات تغییرش بده.</p>
    <a href="index.html" class="hint" style="display:block;margin-top:10px;color:var(--gold)">← بازگشت به سایت</a>
  </div>
</div>
<script src="pricing.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const ok = checkAdminLogin(fd.get('username'), fd.get('password'));
  if(ok){
    setAdminSession(true);
    location.href = 'admin-index.html';
  } else {
    document.getElementById('err').style.display = 'block';
  }
});
if(isAdminLoggedIn()) location.href = 'admin-index.html';
</script>
</body>
</html>
